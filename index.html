<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气预报</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <!-- 顶部导航栏 -->
            <div class="nav-bar">
                <div class="date-time" id="date-time">
                    <i class="far fa-clock"></i>
                    <span>加载中...</span>
                </div>
                <div class="refresh-btn" onclick="weatherApp.refreshWeather()">
                    <i class="fas fa-sync-alt"></i>
                </div>
            </div>

            <!-- 位置信息 -->
            <div class="location">
                <i class="fas fa-location-dot"></i>
                <span id="location-text">正在获取位置...</span>
                <div class="location-status" id="location-status"></div>
            </div>

            <!-- 主要天气信息 -->
            <div class="weather-info">
                <div class="temperature-container">
                    <div class="temperature">
                        <span id="temperature">--</span>
                        <span class="unit">°C</span>
                    </div>
                    <div class="feels-like">
                        体感温度: <span id="feels-like">--</span>°C
                    </div>
                </div>
                <div class="weather-icon">
                    <i id="weather-icon" class="fas fa-sun"></i>
                </div>
                <div class="weather-description" id="weather-description">
                    正在获取天气信息...
                </div>
            </div>

            <!-- 详细信息 -->
            <div class="details">
                <div class="detail-item">
                    <i class="fas fa-wind"></i>
                    <span>风速</span>
                    <span id="wind-speed">-- km/h</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-tint"></i>
                    <span>湿度</span>
                    <span id="humidity">--%</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-compress-alt"></i>
                    <span>气压</span>
                    <span id="pressure">-- hPa</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-eye"></i>
                    <span>能见度</span>
                    <span id="visibility">-- km</span>
                </div>
            </div>

            <!-- 24小时预报 -->
            <div class="hourly-forecast">
                <h3>24小时预报</h3>
                <div class="hourly-container" id="hourly-forecast">
                    <!-- 由JS动态填充 -->
                </div>
            </div>

            <!-- 未来天气预报 -->
            <div class="forecast-section">
                <h3>7天预报</h3>
                <div class="forecast" id="forecast">
                    <!-- 由JS动态填充 -->
                </div>
            </div>

            <!-- API状态指示器 -->
            <div class="api-status">
                <span>数据来源: </span>
                <span id="api-source">正在选择最佳数据源...</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
